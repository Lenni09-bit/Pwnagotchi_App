name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyQt6 paramiko pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --windowed --name Pwnagotchi pwnagotchi_gui.py

      - name: Package as DMG
        run: |
          hdiutil create -volname "Pwnagotchi" \
            -srcfolder dist/Pwnagotchi.app \
            -ov -format UDZO \
            dist/Pwnagotchi.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pwnagotchi-macOS
          path: dist/Pwnagotchi.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyQt6 paramiko pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name Pwnagotchi pwnagotchi_gui.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pwnagotchi-Windows
          path: dist/Pwnagotchi.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Pwnagotchi-macOS
          path: release/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Pwnagotchi-Windows
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Pwnagotchi Manager ${{ github.ref_name }}"
          body: |
            ## 📥 Downloads
            | Platform | File |
            |----------|------|
            | macOS    | `Pwnagotchi.dmg` |
            | Windows  | `Pwnagotchi.exe` |
          files: |
            release/Pwnagotchi.dmg
            release/Pwnagotchi.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
